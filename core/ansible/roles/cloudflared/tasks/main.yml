---
# roles/cloudflared/tasks/main.yml
#
# Installs Docker and deploys cloudflared on cloudflared-01, using
# Cloudflare's remotely-managed tunnel pattern (token-based). All
# ingress routing (which hostnames map to which internal services) is
# configured in the Cloudflare Zero Trust dashboard, NOT here — the
# local cloudflared instance only needs the tunnel token.
#
# Required vars:
#   cloudflare_tunnel_token   - tunnel token from the Zero Trust dashboard (vault)

- name: Install prerequisite packages for Docker repo setup
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Docker's GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/debian/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/debian
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker Engine and Compose plugin
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is enabled and running
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Create cloudflared config directory
  ansible.builtin.file:
    path: /opt/cloudflared
    state: directory
    mode: '0755'

- name: Deploy cloudflared docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/cloudflared/docker-compose.yml
    mode: '0600'   # contains the tunnel token, keep tight permissions
  register: compose_file

- name: Start cloudflared via docker compose
  ansible.builtin.command: docker compose up -d
  args:
    chdir: /opt/cloudflared
  when: compose_file.changed

- name: Inform user cloudflared is deployed
  ansible.builtin.debug:
    msg: >
      cloudflared is running on cloudflared-01. Check the tunnel's health
      in the Cloudflare Zero Trust dashboard (Networks -> Tunnels) — it
      should show as "Healthy" within a minute or two. Public hostname
      routing and Access policies are configured entirely in the
      dashboard, not via Ansible.

# --- DNS stability fix ---
# cloudflared-01 needs to resolve internal-only hostnames (e.g.
# pve-01.ebox86.com) that only exist in dns-01's zone, AND must
# reliably resolve Cloudflare's own infrastructure hostnames
# (region1.v2.argotunnel.com, etc.) for the tunnel connection itself.
#
# A prior manual fix used `resolvectl domain eth0 ~ebox86.com`
# (routing domain) which appeared to destabilize systemd-resolved more
# broadly — confirmed via cloudflared's own logs showing repeated
# "Failed to refresh DNS local resolver... server misbehaving" errors
# against 127.0.0.53 afterward. This task explicitly reverts that
# runtime change, then replaces it with a persistent, declarative
# systemd-resolved drop-in config that avoids the routing-domain
# instability.

- name: Revert the manual routing-domain change (resets eth0 domain to plain search domain)
  ansible.builtin.command: resolvectl domain eth0 ebox86.com
  changed_when: true
  failed_when: false

- name: Create systemd-resolved drop-in directory
  ansible.builtin.file:
    path: /etc/systemd/resolved.conf.d
    state: directory
    mode: '0755'

- name: Configure eth0 DNS via systemd-resolved drop-in config (persistent, survives reboot)
  ansible.builtin.copy:
    dest: /etc/systemd/resolved.conf.d/dns-01-fallback.conf
    content: |
      [Resolve]
      DNS=10.0.0.20 1.1.1.1
      Domains=ebox86.com
      # NOTE: deliberately NOT using a routing domain (~ebox86.com)
      # here — that caused broader resolution instability in testing.
      # Plain search domain + DNS server order is sufficient given the
      # /etc/hosts fallback below covers the one hostname that actually
      # needs guaranteed resolution.
    mode: '0644'
  register: resolved_dropin

- name: Restart systemd-resolved to apply persistent DNS config
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
  when: resolved_dropin.changed

- name: Ensure static /etc/hosts entries for known internal hostnames (reliable fallback, bypasses resolver entirely)
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ item.ip }} {{ item.hostname }}"
    create: true
  loop: "{{ cloudflared_static_hosts | default([{'ip': '10.0.0.10', 'hostname': 'pve-01.ebox86.com'}]) }}"

- name: Inform user about the DNS fix
  ansible.builtin.debug:
    msg: >
      DNS stability fix applied: persistent resolved.conf.d entry
      (dns-01 + Cloudflare fallback) and static /etc/hosts entries for
      known internal hostnames. If cloudflared's tunnel logs still show
      "Failed to refresh DNS local resolver" errors after this, the
      issue is likely systemd-resolved's stub itself (127.0.0.53), not
      the upstream server config — investigate further at that point.

# --- Static route to OKD subnet ---
# cloudflared proxies traffic to OKD endpoints (10.0.1.0/24) but
# cloudflared-01 sits on 10.0.0.0/24. Without an explicit route,
# traffic to 10.0.1.x goes to the default gateway (home router) which
# has no knowledge of the OKD subnet. pve-01 (10.0.0.10) NATs between
# the two subnets, so we route via it.

- name: Write netplan static route for OKD subnet (10.0.1.0/24 via pve-01)
  ansible.builtin.copy:
    dest: /etc/netplan/60-static-routes.yaml
    content: |
      network:
        version: 2
        ethernets:
          eth0:
            routes:
              - to: "10.0.1.0/24"
                via: "10.0.0.10"
    mode: '0600'
  register: netplan_routes

- name: Apply netplan route
  ansible.builtin.command: netplan apply
  when: netplan_routes.changed