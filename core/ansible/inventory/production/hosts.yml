---
# inventory/production/hosts.yml
all:
  hosts:
    pve-01:
      ansible_host: 10.0.0.10
      ansible_user: root

  children:
    proxmox:
      hosts:
        pve-01:

    dhcp_servers:
      hosts:
        dhcp-01:
          ansible_host: 10.10.0.5     # VLAN 10 net0 — management interface
          ansible_user: ansible
          ansible_ssh_private_key_file: ~/.ssh/ebox86_ansible_ed25519
          ansible_ssh_common_args: "-o ProxyJump=root@10.0.0.10"
          # VM on pve-01 (VMID 210), cloned from golden template — reachable after playbook 64

    dns_servers:
      hosts:
        dns-01:
          ansible_host: 10.20.0.20    # VLAN 20 infra — migrated from 10.0.0.20
          ansible_user: ansible
          ansible_ssh_private_key_file: ~/.ssh/ebox86_ansible_ed25519

    cloudflared_hosts:
      hosts:
        cloudflared-01:
          ansible_host: 10.20.0.30    # VLAN 20 infra — migrated from 10.0.0.30
          ansible_user: ansible

    monitoring_hosts:
      hosts:
        pve-01:
        dns-01:
        dhcp-01:
        cloudflared-01:
          ansible_ssh_private_key_file: ~/.ssh/ebox86_ansible_ed25519
          ansible_ssh_common_args: "-o ProxyJump=root@10.0.0.10"

    aruba_mc:
      hosts:
        gw-mc-01:
          ansible_host: 10.0.0.254
          ansible_user: admin
          # ansible_password comes from secrets/vault.yml (mc_admin_password)
          # connection: local is set in the play — REST API on port 4343, no SSH

    aruba_aps:
      hosts:
        ap-01:
          ansible_host: 10.10.0.251    # static VC IP on VLAN 10 (set manually on first boot)
          ansible_user: admin
          # Instant mode VC — REST API on port 4343, connection: local set in play
          # ansible_password unused (REST API auth uses ap_admin_password from vault)

    cx_switches:
      hosts:
        cx6000-01:
          ansible_host: 10.0.0.250
          ansible_user: admin
          ansible_connection: arubanetworks.aoscx.aoscx
          ansible_network_os: aoscx
          ansible_aoscx_validate_certs: false
          ansible_aoscx_use_proxy: false
          ansible_acx_no_proxy: true

    ilo_hosts:
      hosts:
        # Add one entry per server — ansible_host is the iLO management IP
        # Example (uncomment and set your actual iLO IP):
        # ilo-pve-01:
        #   ansible_host: 10.0.0.11