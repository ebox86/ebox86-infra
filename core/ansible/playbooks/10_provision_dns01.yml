---
# playbooks/10_provision_dns01.yml
#
# Clones the golden template into dns-01, configures it (2 cores, 2GB
# RAM, static IP on local-zfs/rpool), starts it, and waits for SSH.
#
# Usage:
#   ansible-playbook playbooks/10_provision_dns01.yml

- name: Provision dns-01 VM
  hosts: proxmox
  become: true
  vars:
    vm_id: 100
    vm_name: dns-01
    vm_ip: 10.0.0.20
    vm_cidr: 24
    vm_cores: 2
    vm_memory_mb: 2048
    vm_storage: local-zfs
    vm_ciuser: ansible
    ssh_pubkey_local_path: "~/.ssh/ebox86_ansible_ed25519.pub"
  vars_files:
    - ../vars/network_topology.yml
  roles:
    - proxmox_vm_clone