---
# NFD worker DaemonSet needs privileged SCC on OKD to read /sys and /dev
# for hardware feature detection. Applied before the SA exists — takes effect
# as soon as the nfd Helm release creates the worker ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nfd-worker-privileged-scc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: nfd-node-feature-discovery-worker
    namespace: openshift-nfd
