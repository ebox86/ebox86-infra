---
# Bootstrap the App of Apps — apply once after ArgoCD is installed.
# This is the ONLY thing you ever apply manually. After this, everything
# else is managed by ArgoCD watching k8s/argocd/apps/ in git.
#
# oc apply -f k8s/argocd/bootstrap/root-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/ebox86/ebox86-infra.git
    targetRevision: main
    path: k8s/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
