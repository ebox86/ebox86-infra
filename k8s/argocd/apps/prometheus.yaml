---
# kube-prometheus-stack deployed as "prometheus-infra" release.
# fullnameOverride ensures the prometheus Service is named
# "prometheus-infra-prometheus" — matches the datasource URL in grafana.yaml.
#
# Components disabled to avoid conflicting with OKD's built-in openshift-monitoring:
#   kubeControllerManager, kubeScheduler, kubeEtcd, kubeProxy
#
# Grafana is disabled — deployed separately via apps/grafana.yaml.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: openshift-gitops
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: lab.ebox86.com
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: "*"
    helm:
      releaseName: prometheus-infra
      values: |
        fullnameOverride: prometheus-infra

        grafana:
          enabled: false

        prometheus:
          prometheusSpec:
            retention: 30d
            storageSpec:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-client
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 50Gi

        alertmanager:
          alertmanagerSpec:
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: nfs-client
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi

        # OKD's openshift-monitoring already covers these
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeProxy:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
