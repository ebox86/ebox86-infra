---
# metallb-speaker needs privileged SCC for ARP (hostNetwork, NET_ADMIN).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metallb-speaker-privileged-scc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: metallb-speaker
    namespace: metallb-system
---
# metallb-frr-k8s-controller needs privileged SCC for hostNetwork and
# NET_ADMIN/NET_RAW/SYS_ADMIN capabilities required by the FRR routing daemon.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metallb-frr-k8s-privileged-scc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:privileged
subjects:
  - kind: ServiceAccount
    name: metallb-frr-k8s-controller
    namespace: metallb-system
---
# metallb-controller needs anyuid SCC because it runs as UID 65534 (nobody),
# which is outside the OKD default UID range.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metallb-controller-anyuid-scc
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:openshift:scc:anyuid
subjects:
  - kind: ServiceAccount
    name: metallb-controller
    namespace: metallb-system
